[defaults]
inventory      = inventory/hosts.ini
remote_user    = ubuntu
private_key_file = ~/.ssh/lb-devops-key
# The instance's public IP - and therefore its SSH host key - changes
# every time Terraform recreates it. With host key checking on, Ansible
# would refuse to connect to a "new" host until you manually accepted its
# fingerprint. Disabling it is a deliberate tradeoff for this disposable,
# short-lived dev box - it weakens protection against a MITM swapping the
# host key, which is not a tradeoff you'd accept for a long-lived
# production host with a stable address.
host_key_checking = False
interpreter_python = auto_silent
