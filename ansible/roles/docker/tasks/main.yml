---
# This is the exact install logic that used to live in Terraform's
# user_data. Moved here unchanged in substance - only the tool running it
# changed. Docker's own apt repo is used (not Ubuntu's bundled docker.io)
# because Ubuntu's default repos don't ship a docker-compose-plugin
# package at all - only Docker's repo does, and it keeps the
# engine/compose/buildx versions in sync with each other.

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - make
      - git
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker's apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start the Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add ubuntu user to the docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

# Group membership only takes effect on a *new* login session - the SSH
# connection Ansible already has open still has the old group list. This
# forces Ansible to reconnect so every task after this one (and the deploy
# role that follows) actually runs as a member of the docker group,
# without needing `become`/sudo for docker commands.
- name: Reset connection so docker group membership takes effect
  ansible.builtin.meta: reset_connection
