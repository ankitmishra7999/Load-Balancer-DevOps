---
- name: Clone or update the repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: main
    force: true

# Runs as the ubuntu user, no become/sudo - the docker role already put it
# in the docker group and reset the connection so that membership is live.
- name: Build and start the stack (make all)
  ansible.builtin.command:
    cmd: make all
    chdir: "{{ app_dir }}/project"
  register: make_all
  changed_when: true

- name: Show make all output
  ansible.builtin.debug:
    var: make_all.stdout_lines

# Confirms the deploy actually worked as part of this run, rather than
# leaving that as a manual curl you might forget to do.
- name: Wait for the load balancer to answer /status
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}/status"
    status_code: 200
  register: status_check
  until: status_check.status == 200
  retries: 10
  delay: 5
